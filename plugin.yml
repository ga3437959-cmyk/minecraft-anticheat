name: AntiCheat
version: 1.0.0
main: com.anticheat.AntiCheatPlugin
description: Enterprise Anti-Cheat for Bukkit
author: ga3437959-cmyk
api-version: "1.20"

commands:
  anticheat:
    description: Main AntiCheat command
    usage: /anticheat <reload|check|stats|ban|unban>
    permission: anticheat.admin
  appeal:
    description: Appeal your ban
    usage: /appeal <reason>
    permission: anticheat.appeal

permissions:
  anticheat.admin:
    description: Admin commands
    default: op
  anticheat.bypass:
    description: Bypass AntiCheat
    default: false
  anticheat.notify:
    description: Receive alerts
    default: op